name: Fr2 m3u8 Windscribe

on:
 # schedule:
  #  - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Vérifier le code source
      uses: actions/checkout@v5

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Installer les dépendances
      run: |
        sudo apt-get update
        sudo apt-get install -y openvpn openvpn-systemd-resolved
        pip install requests

    - name: Connexion au VPN Windscribe
      run: |
        # Création des fichiers d'authentification
        echo "${{ secrets.OPENVPN_CONFIG }}" > config.ovpn
        echo "${{ secrets.WINDSCRIBE_CREDENTIALS }}" > pass.txt
        
        # Modification de la config pour accepter les identifiants et gérer le DNS
        sed -i 's/auth-user-pass/auth-user-pass pass.txt/' config.ovpn
        
        # Lancement OpenVPN avec des options de sécurité pour GitHub Actions
        sudo openvpn --config config.ovpn --daemon --dev tun --writepid /tmp/vpn.pid
        
        # Attente de la connexion (Windscribe est rapide, 20-30s suffisent généralement)
        echo "Connexion à Windscribe en cours..."
        timeout 60s bash -c 'until curl -s https://ipapi.co/country_code/ | grep -q "FR"; do sleep 5; echo "Attente du tunnel..."; done'

        # Vérification finale
        FINAL_IP=$(curl -s https://api.ipify.org)
        COUNTRY=$(curl -s https://ipapi.co/country_code/)
        echo "Connecté avec l'IP: $FINAL_IP ($COUNTRY)"
        
        if [ "$COUNTRY" != "FR" ]; then
          echo "::error::Échec de localisation en France. Pays actuel: $COUNTRY"
          exit 1
        fi

    - name: Exécuter le script Python
      run: |
        python ${GITHUB_WORKSPACE}/a02/script_fr2.py

    - name: Arrêter le VPN
      if: always()
      run: |
        if [ -f /tmp/vpn.pid ]; then
          sudo kill $(cat /tmp/vpn.pid)
        fi

    - name: Commit des changements
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'Actualisation automatique via Windscribe FR'
